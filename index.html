<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Marketing 30Shine</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .nav-btn.active { background: linear-gradient(90deg,#06b6d4,#0891b2); color:#fff; }
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
  .fade{animation:f .3s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body class="bg-slate-950 text-slate-100">

<div class="flex min-h-screen">
  <!-- SIDEBAR -->
  <aside id="sidebar" class="w-60 shrink-0 bg-slate-900 border-r border-slate-800 p-4 flex-col gap-1 top-0 h-screen z-30 hidden md:flex fixed md:sticky">
    <div class="flex items-center gap-2 mb-5 px-2">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-cyan-400 to-teal-600 grid place-items-center font-black text-slate-950">30</div>
      <div><div class="font-bold leading-tight">30Shine</div><div class="text-[11px] text-slate-400 leading-tight">Marketing Dashboard</div></div>
    </div>
    <nav id="nav" class="flex flex-col gap-1 text-sm"></nav>
    <div class="mt-auto text-[11px] text-slate-500 px-2 pt-4 border-t border-slate-800">
      <div id="metaKy"></div><div id="metaCapNhat" class="mt-0.5"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 min-w-0">
    <header class="sticky top-0 z-10 bg-slate-950/80 backdrop-blur border-b border-slate-800 px-4 md:px-6 py-3 flex items-center justify-between gap-3">
      <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-slate-300 text-xl leading-none px-1" aria-label="Menu">☰</button>
      <div class="min-w-0 flex-1"><h1 id="pageTitle" class="text-lg font-bold leading-tight">Tổng quan</h1><div id="pageDesc" class="text-[12px] text-slate-400 leading-tight"></div></div>
      <div id="metaNote" class="text-[11px] text-slate-400 max-w-xs text-right hidden lg:block shrink-0"></div>
    </header>
    <div id="content" class="p-6"><div class="text-slate-400">Đang tải dữ liệu…</div></div>
  </main>
</div>

<script src="data.js"></script>
<script>
const D = window.DASHBOARD_DATA;
const fmt = n => n==null ? "—" : n.toLocaleString("vi-VN");
const fmtC = n => { if(n==null) return "—"; const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(n%1e6?2:0).replace(/\.?0+$/,"")+"M";
  if(a>=1e3) return (n/1e3).toFixed(n%1e3?1:0).replace(/\.?0+$/,"")+"K"; return fmt(n); };
const pct = (a,t) => (a==null||!t) ? null : Math.round(a/t*100);
const barColor = p => p==null?"bg-slate-600":p>=90?"bg-emerald-500":p>=50?"bg-amber-500":"bg-rose-500";
const chip = (txt,cls)=>`<span class="text-[11px] px-2 py-0.5 rounded-full ${cls}">${txt}</span>`;
const statusChip = s => {
  const m={WIN:"bg-emerald-500/20 text-emerald-300",LOCK:"bg-sky-500/20 text-sky-300",TEST:"bg-amber-500/20 text-amber-300",FAIL:"bg-rose-500/20 text-rose-300"};
  return chip(s, m[s]||"bg-slate-600/30 text-slate-300");
};
const card = (inner,extra="") => `<div class="bg-slate-900 border border-slate-800 rounded-xl p-4 ${extra}">${inner}</div>`;
const stars = n => "★".repeat(n)+"☆".repeat(5-n);

/* màu theo demand — dùng xuyên các bảng/biểu đồ để truy vết */
const DEMAND_COLORS = [["tour","#06b6d4"],["trưa","#f59e0b"],["thera","#a855f7"],["phục hồi","#a855f7"],["tan làm","#14b8a6"],["tóc","#f43f5e"],["level","#f43f5e"],["coder","#f43f5e"],["vp","#f43f5e"],["cross","#38bdf8"],["world cup","#38bdf8"]];
function demandColor(s){ s=(s||"").toLowerCase(); for(const [k,c] of DEMAND_COLORS){ if(s.includes(k)) return c; } return "#64748b"; }
function demandDot(s){ return `<span class="inline-block w-2 h-2 rounded-full mr-1.5 align-middle" style="background:${demandColor(s)}"></span>`; }
/* demand -> trang CTA phù hợp */
function ctaFor(s){ const L=(window.DASHBOARD_DATA||{}).ctaLinks||{}; s=(s||"").toLowerCase();
  if(/tóc|level|coder|vp|mỏng/.test(s)) return {url:L.uon,ten:"Uốn/dưỡng"};
  if(/tour|trưa|thera|phục hồi|tan làm|nghỉ/.test(s)) return {url:L.spaRelax,ten:"Spa-relax"};
  return {url:L.booking,ten:"Đặt lịch"}; }
const linkCell = (url,txt) => url ? `<a href="${url}" target="_blank" class="text-cyan-400 hover:underline">${txt||'Mở'} ↗</a>` : '<span class="text-slate-600">—</span>';

/* chart registry — tạo/huỷ an toàn theo id canvas */
const CHARTS = {};
function mkChart(id,cfg){ const ctx=document.getElementById(id); if(!ctx||typeof Chart==="undefined")return; if(CHARTS[id])CHARTS[id].destroy(); CHARTS[id]=new Chart(ctx,cfg); }
if(typeof Chart!=="undefined"){ Chart.defaults.color="#94a3b8"; Chart.defaults.font.family="system-ui,Segoe UI,Roboto,sans-serif"; Chart.defaults.font.size=11; }
const axisOpts = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#94a3b8"},grid:{color:"#1e293b"}},y:{ticks:{color:"#94a3b8"},grid:{color:"#1e293b"}}}};

const TABS = [
  {id:"tongquan", ten:"1 · Tổng quan", icon:"📊", mota:"Mục tiêu tháng & % đạt — Earned media, Ads, SEO"},
  {id:"trang",    ten:"2 · Trang theo dõi", icon:"📄", mota:"6 trang Facebook đang chạy — follower, reach, tăng trưởng theo ngày"},
  {id:"content",  ten:"3 · Nội dung theo Demand", icon:"🎬", mota:"6 tuyến demand · tuyến sản xuất earned media · dư luận seeding"},
  {id:"seo",      ten:"4 · SEO", icon:"🔍", mota:"Keyword & rank vs mục tiêu · cluster · bài viết"},
  {id:"chiso",    ten:"5 · Chỉ số đề xuất", icon:"📈", mota:"Số ads + traffic LIVE · tier CPM · đề xuất hành động"},
  {id:"danhgia",  ten:"6 · Đánh giá nội dung", icon:"✅", mota:"Đánh giá sơ bộ + đề xuất cho từng tuyến nội dung"},
];

/* ---------- RENDERERS ---------- */
function rTongQuan(){
  const mkCard = m => {
    let p = pct(m.actual,m.target);
    if(m.thapTotHon && m.actual!=null && m.target) p = m.actual<=m.target ? 100 : Math.round(m.target/m.actual*100);
    const actEl = m.actual==null ? '<span class="text-slate-500 text-base">chưa có</span>' : fmtC(m.actual);
    return card(`
      <div class="flex items-start justify-between gap-2">
        <div class="text-sm text-slate-300 font-medium">${m.ten}</div>
        <div class="text-right shrink-0"><span class="text-2xl font-bold">${actEl}</span><span class="text-slate-500 text-xs"> / ${fmtC(m.target)} ${m.donVi}</span></div>
      </div>
      <div class="mt-3 h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full ${barColor(p)}" style="width:${p==null?0:Math.min(p,100)}%"></div></div>
      <div class="mt-1.5 flex items-center justify-between">
        <span class="text-[11px] font-medium ${p==null?'text-slate-500':p>=90?'text-emerald-400':p>=50?'text-amber-400':'text-rose-400'}">${p==null?'Cần cập nhật':p+'% đạt'}</span>
        <span class="text-[11px] text-slate-500">${m.nguon}</span>
      </div>
      <div class="mt-2 text-[11px] text-slate-400 leading-snug">${m.note}</div>
    `,"hover:border-slate-700 transition");
  };
  const isSeo = m => /SEO/i.test(m.nguon);
  const grid = arr => `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">${arr.map(mkCard).join("")}</div>`;
  const head = t => `<div class="flex items-center gap-2 mb-3"><div class="w-1 h-4 rounded bg-cyan-400"></div><h2 class="text-xs font-semibold uppercase tracking-wide text-slate-300">${t}</h2></div>`;
  const chart = card(`<h3 class="font-semibold mb-3">% đạt mục tiêu (tổng quan)</h3><div class="relative h-72"><canvas id="tqChart"></canvas></div>`,"mb-6");
  return chart + head("Earned Media & Ads") + grid(D.tongQuan.filter(m=>!isSeo(m)))
    + `<div class="mt-6">` + head("SEO") + grid(D.tongQuan.filter(isSeo)) + `</div>`;
}

function rContent(){
  const tbl = (title,head,rows)=>card(`<h3 class="font-semibold mb-3">${title}</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`,"mb-4");
  const uuChip = u => chip(u, /CAO/.test(u)?'bg-rose-500/20 text-rose-300':'bg-slate-600/30 text-slate-300');

  const demandRows = D.demands.map(d=>`<tr class="border-t border-slate-800 align-top ${/CAO/.test(d.uuTien)?'bg-slate-800/40':''}" style="border-left:3px solid ${demandColor(d.ten)}">
    <td class="py-2 pr-3 font-medium">${demandDot(d.ten)}${d.ten}</td>
    <td class="py-2 pr-3 text-slate-400">${d.noiDau}</td>
    <td class="py-2 pr-3 text-teal-300">${d.concept}</td>
    <td class="py-2 pr-3 text-slate-400">${d.giaiPhap}</td>
    <td class="py-2 pr-3">${uuChip(d.uuTien)}</td>
    <td class="py-2 whitespace-nowrap">${linkCell(ctaFor(d.ten).url, ctaFor(d.ten).ten)}</td></tr>`).join("");

  const sxRows = D.tuyenSanXuat.map(t=>`<tr class="border-t border-slate-800 align-top">
    <td class="py-2 pr-3 font-medium">${t.tuyen}</td>
    <td class="py-2 pr-3 text-center">${t.soBai}</td>
    <td class="py-2 pr-3 text-right">${fmtC(t.reach)}</td>
    <td class="py-2 pr-3 text-teal-300">${t.concept}</td>
    <td class="py-2 pr-3">${t.nguoiLam}</td>
    <td class="py-2 pr-3 text-slate-400">${t.note}</td>
    <td class="py-2 whitespace-nowrap">${linkCell(t.link)}</td></tr>`).join("");

  const dlRows = D.duLuan.map(p=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3 whitespace-nowrap">${p.ngay}</td>
    <td class="py-2 pr-3">${p.postGoc}</td>
    <td class="py-2 pr-3"><span class="text-[11px] px-2 py-0.5 rounded-full font-medium" style="background:${demandColor(p.demand)}22;color:${demandColor(p.demand)}">${p.demand}</span></td>
    <td class="py-2 pr-3 text-slate-400">${p.kenh}</td>
    <td class="py-2 pr-3">${chip(p.trangThai, p.trangThai==='Done'?'bg-emerald-500/20 text-emerald-300':'bg-amber-500/20 text-amber-300')}</td>
    <td class="py-2 whitespace-nowrap">${linkCell(p.link)}</td></tr>`).join("");

  const L=D.ctaLinks||{};
  const ctaCard = card(`<h3 class="font-semibold mb-2">Link CTA chuẩn (gắn vào content)</h3>
    <div class="flex flex-wrap gap-2 text-xs">
      ${[["Homepage",L.homepage],["Đặt lịch",L.booking],["Hệ thống salon",L.salon],["Cắt tóc",L.catToc],["Spa-relax",L.spaRelax],["Uốn/dưỡng",L.uon]].map(([t,u])=>u?`<a href="${u}" target="_blank" class="px-2.5 py-1 rounded-full bg-slate-800 text-cyan-400 hover:bg-slate-700">${t} ↗</a>`:'').join("")}
    </div>
    <div class="mt-2 text-[11px] text-slate-500">Hashtag: #30Shine #cattocnam</div>`,"mb-4");
  return ctaCard + tbl("6 tuyến demand đang chạy — nỗi đau / concept / giải pháp",
      `<th class="text-left pb-2 pr-3">Demand</th><th class="text-left pb-2 pr-3">Nỗi đau</th><th class="text-left pb-2 pr-3">Concept</th><th class="text-left pb-2 pr-3">Giải pháp/dịch vụ</th><th class="text-left pb-2 pr-3">Ưu tiên</th><th class="text-left pb-2">CTA</th>`, demandRows)
    + tbl("Tuyến sản xuất earned media (W2–W4)",
      `<th class="text-left pb-2 pr-3">Tuyến</th><th class="pb-2 pr-3">Số bài</th><th class="text-right pb-2 pr-3">Reach dự kiến</th><th class="text-left pb-2 pr-3">Concept</th><th class="text-left pb-2 pr-3">Người làm</th><th class="text-left pb-2 pr-3">Ghi chú</th><th class="text-left pb-2">Link bài</th>`, sxRows)
    + tbl("Dư luận seeding (Chương) — bridge cho demand nào",
      `<th class="text-left pb-2 pr-3">Ngày</th><th class="text-left pb-2 pr-3">Post gốc</th><th class="text-left pb-2 pr-3">Demand</th><th class="text-left pb-2 pr-3">Kênh</th><th class="text-left pb-2 pr-3">Trạng thái</th><th class="text-left pb-2">Link bài</th>`, dlRows)
    + `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        ${card(`<h3 class="font-semibold mb-3">Reach dự kiến theo tuyến</h3><div class="relative h-56"><canvas id="reachChart"></canvas></div>`)}
        ${card(`<h3 class="font-semibold mb-3">Dư luận seeding theo demand (số post)</h3><div class="relative h-56"><canvas id="dlChart"></canvas></div>`)}
       </div>`;
}

function rSeo(){
  const t=D.seoTargets;
  const top = card(`<div class="grid grid-cols-3 gap-4 text-center">
      <div><div class="text-2xl font-bold text-cyan-400">${fmt(t.sessions)}</div><div class="text-xs text-slate-400">Sessions /discovers (baseline ${t.baseline})</div></div>
      <div><div class="text-2xl font-bold">${t.baiLive}</div><div class="text-xs text-slate-400">Bài live cuối T6</div></div>
      <div><div class="text-2xl font-bold text-emerald-400">≥${t.er}%</div><div class="text-xs text-slate-400">Engagement Rate</div></div>
    </div><div class="mt-2 text-[11px] text-slate-400">${t.note}</div>`,"mb-4");

  const wRows = D.seoWeekly.map(w=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3 font-medium">${w.tuan}</td><td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${w.period}</td>
    <td class="py-2 pr-3 text-right">${fmt(w.target)}</td>
    <td class="py-2 pr-3 text-right">${w.actual==null?'<span class="text-slate-600">—</span>':fmt(w.actual)}</td>
    <td class="py-2 text-slate-400">${w.ghiChu}</td></tr>`).join("");
  const wTbl = card(`<h3 class="font-semibold mb-3">Tiến độ tuần (sessions target → actual)</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="text-left pb-2 pr-3">Tuần</th><th class="text-left pb-2 pr-3">Kỳ</th><th class="text-right pb-2 pr-3">Target</th><th class="text-right pb-2 pr-3">Actual</th><th class="text-left pb-2">Ghi chú</th></tr></thead><tbody>${wRows}</tbody></table></div>`,"mb-4");
  const chartCard = card(`<h3 class="font-semibold mb-3">Sessions: target tuần vs actual</h3><div class="relative h-56"><canvas id="seoChart"></canvas></div>`,"mb-4");

  const hsRows = D.seoHieuSuat.map(h=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3 font-medium">${h.ten}</td><td class="py-2 pr-3 text-slate-400">${h.do}</td>
    <td class="py-2 pr-3 text-center text-slate-400">${h.baseline}</td>
    <td class="py-2 pr-3 text-cyan-300">${h.target}</td>
    <td class="py-2 text-right">${h.actual==null?'<span class="text-slate-600">—</span>':fmt(h.actual)}</td></tr>`).join("");
  const hsTbl = card(`<h3 class="font-semibold mb-3">Hiệu suất — chỉ số ngoài sessions</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="text-left pb-2 pr-3">Chỉ số</th><th class="text-left pb-2 pr-3">Đo bằng</th><th class="pb-2 pr-3">Baseline</th><th class="text-left pb-2 pr-3">Target</th><th class="text-right pb-2">Actual</th></tr></thead><tbody>${hsRows}</tbody></table></div>`,"mb-4");

  const stColor = s => s==='published'?'bg-emerald-500/20 text-emerald-300':s==='in_progress'?'bg-amber-500/20 text-amber-300':s==='scheduled'?'bg-cyan-500/20 text-cyan-300':'bg-slate-600/30 text-slate-300';
  const aRows = D.seoArticles.map(a=>`<tr class="border-t border-slate-800 align-top" style="border-left:3px solid ${demandColor(a.demand)}">
    <td class="py-2 pr-3 text-slate-500">${a.n}</td>
    <td class="py-2 pr-3 whitespace-nowrap">${a.tuan}</td>
    <td class="py-2 pr-3 font-medium">${a.wc?'⚽ ':''}${a.ten}${a.note?`<div class="text-[11px] text-amber-400">${a.note}</div>`:''}</td>
    <td class="py-2 pr-3 whitespace-nowrap"><span class="text-[11px]" style="color:${demandColor(a.demand)}">${demandDot(a.demand)}${a.demand}</span></td>
    <td class="py-2 pr-3 text-slate-400">${a.kw} <span class="text-slate-600">(${a.vol})</span></td>
    <td class="py-2 pr-3 text-slate-500">${a.loai}</td>
    <td class="py-2">${chip(a.status, stColor(a.status))}</td></tr>`).join("");
  const aTbl = card(`<h3 class="font-semibold mb-3">9 bài SEO T6 — keyword · demand · status</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="pb-2 pr-3">#</th><th class="text-left pb-2 pr-3">Tuần</th><th class="text-left pb-2 pr-3">Tiêu đề</th><th class="text-left pb-2 pr-3">Demand</th><th class="text-left pb-2 pr-3">Keyword (vol)</th><th class="text-left pb-2 pr-3">Loại</th><th class="text-left pb-2">Status</th></tr></thead><tbody>${aRows}</tbody></table></div>`,"mb-4");

  const pColor = p => p==='P0'?'bg-rose-500/20 text-rose-300':p==='P1'?'bg-amber-500/20 text-amber-300':'bg-slate-600/30 text-slate-300';
  const stTask = s => !s?chip("Cần cập nhật","bg-slate-700/40 text-slate-400")
    : chip(s, /xong|done|ok/i.test(s)?'bg-emerald-500/20 text-emerald-300':/đang/i.test(s)?'bg-amber-500/20 text-amber-300':'bg-rose-500/20 text-rose-300');
  const techRows = D.seoTechnical.map(x=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3">${chip(x.p,pColor(x.p))}</td>
    <td class="py-2 pr-3">${x.viec}</td><td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${x.owner}</td>
    <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${x.deadline}</td>
    <td class="py-2">${stTask(x.status)}</td></tr>`).join("");
  const techTbl = card(`<h3 class="font-semibold mb-3">Technical checklist (P0 phải xong trước 7/6 = điều kiện tracking)</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="text-left pb-2 pr-3">Ưu tiên</th><th class="text-left pb-2 pr-3">Việc</th><th class="text-left pb-2 pr-3">Owner</th><th class="text-left pb-2 pr-3">Deadline</th><th class="text-left pb-2">Trạng thái</th></tr></thead><tbody>${techRows}</tbody></table></div>`);

  return top + `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">${wTbl}${chartCard}</div>` + hsTbl + aTbl + techTbl;
}

function rChiSo(){
  // LIVE block
  const la = D.liveAds, lt = D.liveTraffic;
  const liveAdsCard = la ? card(`
    <div class="flex items-center justify-between mb-3"><h3 class="font-semibold">🔴 Ads LIVE (Meta API)</h3><span class="text-[11px] text-slate-400">${la.ky}</span></div>
    <div class="grid grid-cols-3 gap-3 text-center mb-3">
      <div><div class="text-xl font-bold">${la.tongChi}tr</div><div class="text-xs text-slate-400">Tổng chi</div></div>
      <div><div class="text-xl font-bold ${la.cpmTong<=18000?'text-amber-400':'text-rose-400'}">${fmt(la.cpmTong)}đ</div><div class="text-xs text-slate-400">CPM tổng</div></div>
      <div><div class="text-xl font-bold">${fmtC(la.tongReach)}</div><div class="text-xs text-slate-400">Reach</div></div>
    </div>
    <table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr><th class="text-left pb-2 pr-3">Tài khoản</th><th class="text-right pb-2 pr-3">Chi</th><th class="text-right pb-2 pr-3">CPM</th><th class="text-right pb-2">CTR</th></tr></thead><tbody>
    ${la.accounts.map(a=>`<tr class="border-t border-slate-800"><td class="py-2 pr-3">${a.ten}</td><td class="py-2 pr-3 text-right">${a.chi}tr</td><td class="py-2 pr-3 text-right ${a.cpm<=9000?'text-emerald-400':a.cpm<=15000?'text-teal-400':a.cpm<=18000?'text-amber-400':'text-rose-400'}">${fmt(a.cpm)}đ</td><td class="py-2 text-right">${a.ctr}%</td></tr>`).join("")}
    </tbody></table>
    <div class="mt-2 text-[11px] text-slate-400">${la.note}</div>`,"mb-4") : "";

  const liveTrafficCard = lt ? card(`
    <div class="flex items-center justify-between mb-3"><h3 class="font-semibold">🔴 Traffic LIVE (GA4 · 30shine.com)</h3><span class="text-[11px] text-slate-400">${lt.ky}</span></div>
    <div class="text-center mb-3"><span class="text-2xl font-bold">${fmt(lt.tong)}</span><span class="text-xs text-slate-400"> ss tổng</span></div>
    ${lt.channels.map(c=>{const p=Math.round(c.ss/lt.tong*100);return `<div class="mb-1.5"><div class="flex justify-between text-xs mb-0.5"><span class="${c.canhBao?'text-rose-400 font-medium':'text-slate-300'}">${c.ten}${c.canhBao?' ⚠':''}</span><span class="text-slate-400">${fmt(c.ss)} (${p}%)</span></div><div class="h-1.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full ${c.canhBao?'bg-rose-500':'bg-cyan-500'}" style="width:${p}%"></div></div></div>`;}).join("")}
    <div class="mt-2 text-[11px] text-slate-400">${lt.note}</div>`,"mb-4") : "";

  const liveRow = (liveAdsCard||liveTrafficCard) ? `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">${liveAdsCard}${liveTrafficCard}</div>` : "";

  const tierTbl = (title,arr)=>card(`<h3 class="font-semibold mb-3">${title}</h3>
    <table class="w-full text-sm"><tbody>${arr.map(t=>`<tr class="border-t border-slate-800">
      <td class="py-2 pr-3 font-medium whitespace-nowrap">${t.tier}</td>
      <td class="py-2 pr-3 text-slate-400">${t.dieuKien}</td>
      <td class="py-2 text-slate-300">${t.action}</td></tr>`).join("")}</tbody></table>`);

  const campRows = (la.campaigns||[]).map(c=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3">${c.ten}</td>
    <td class="py-2 pr-3 text-right">${c.chi}tr</td>
    <td class="py-2 pr-3 text-right ${c.cpm<=9000?'text-emerald-400':c.cpm<=15000?'text-teal-400':c.cpm<=18000?'text-amber-400':'text-rose-400'}">${fmt(c.cpm)}đ</td>
    <td class="py-2 pr-3 text-right">${fmt(c.donHang)}</td>
    <td class="py-2 text-right ${c.cpa==null?'text-slate-500':c.cpa<=21?'text-emerald-400':'text-rose-400'}">${c.cpa==null?'—':c.cpa+'K'}</td></tr>`).join("");
  const campTbl = card(`<h3 class="font-semibold mb-3">Campaign LIVE — chi tiêu / CPM / đơn / CPA</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="text-left pb-2 pr-3">Campaign</th><th class="text-right pb-2 pr-3">Chi</th><th class="text-right pb-2 pr-3">CPM</th><th class="text-right pb-2 pr-3">Đơn</th><th class="text-right pb-2">CPA</th></tr></thead><tbody>${campRows}</tbody></table></div>`,"mb-4");

  const dxRows = D.deXuat.map(d=>`<div class="flex gap-3 py-2 border-t border-slate-800">
    <div>${chip(d.uuTien, d.uuTien==='Cao'?'bg-rose-500/20 text-rose-300':'bg-amber-500/20 text-amber-300')}</div>
    <div class="flex-1"><div class="text-sm">${d.noiDung}</div><div class="text-[11px] text-slate-500 mt-0.5">Căn cứ: ${d.canCu}</div></div></div>`).join("");
  const dxCard = card(`<h3 class="font-semibold mb-2">Đề xuất thực tế (dựa trên số ads + traffic)</h3>${dxRows}`);
  const cpmChartCard = (la.campaigns&&la.campaigns.length)
    ? card(`<h3 class="font-semibold mb-3">CPM campaign vs ngưỡng tier (xanh tốt → đỏ CUT)</h3><div class="relative h-48"><canvas id="cpmChart"></canvas></div>`,"mb-4") : "";

  return liveRow + campTbl + cpmChartCard
    + `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">${tierTbl("Tier Facebook",D.adsTiers.facebook)}${tierTbl("Tier TikTok",D.adsTiers.tiktok)}</div>`
    + dxCard;
}

const VERDICT = s => s>=5?["SCALE / Ưu tiên cao","bg-emerald-500/20 text-emerald-300"]:s>=4?["DUY TRÌ","bg-cyan-500/20 text-cyan-300"]:["THEO DÕI","bg-amber-500/20 text-amber-300"];
function rDanhGia(){
  const items=[...D.danhGia].sort((a,b)=>b.sao-a.sao);
  const demands=[...new Set(items.map(d=>d.demand))];
  const filterBtns = `<div class="flex flex-wrap gap-2 mb-4">
    <button onclick="filterDG('all')" data-f="all" class="dg-f text-xs px-3 py-1 rounded-full bg-cyan-600 text-white">Tất cả</button>
    ${demands.map(dm=>`<button onclick="filterDG('${dm}')" data-f="${dm}" class="dg-f text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-300 hover:bg-slate-700"><span class="inline-block w-2 h-2 rounded-full mr-1" style="background:${demandColor(dm)}"></span>${dm}</button>`).join("")}
  </div>`;
  const cards = items.map(d=>{ const [vTxt,vCls]=VERDICT(d.sao); return `<div class="dg-card bg-slate-900 border border-slate-800 rounded-xl p-4 hover:border-slate-700 transition" data-demand="${d.demand}" style="border-left:3px solid ${demandColor(d.demand)}">
    <div class="flex items-start justify-between gap-2">
      <div class="font-semibold">${d.nd}</div>
      ${chip(vTxt,vCls)}
    </div>
    <div class="flex items-center gap-2 mt-1"><span class="text-amber-400 text-sm">${stars(d.sao)}</span><span class="text-[11px] px-2 py-0.5 rounded-full font-medium" style="background:${demandColor(d.demand)}22;color:${demandColor(d.demand)}">${d.demand}</span></div>
    <div class="mt-2 text-sm text-slate-300"><span class="text-slate-500">Đánh giá:</span> ${d.danhGia}</div>
    <div class="mt-2 text-sm text-emerald-300/90"><span class="text-slate-500">Đề xuất:</span> ${d.deXuat}</div>
  </div>`; }).join("");
  return filterBtns + `<div id="dgGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-4">${cards}</div>`;
}
function filterDG(f){
  document.querySelectorAll(".dg-f").forEach(b=>{const on=b.dataset.f===f;b.className="dg-f text-xs px-3 py-1 rounded-full "+(on?"bg-cyan-600 text-white":"bg-slate-800 text-slate-300 hover:bg-slate-700");});
  document.querySelectorAll(".dg-card").forEach(c=>{c.style.display=(f==="all"||c.dataset.demand===f)?"":"none";});
}

/* ---------- ROUTER ---------- */
function rTrang(){
  const pages = D.trangTheoDoi||[];
  const duLuan = pages.filter(p=>p.loai==='Dư luận').length;
  const filled = pages.filter(p=>p.follower!=null).length;
  const head = card(`
    <div class="grid grid-cols-3 gap-3 text-center">
      <div><div class="text-2xl font-bold">${pages.length}</div><div class="text-xs text-slate-400">Trang theo dõi</div></div>
      <div><div class="text-2xl font-bold text-cyan-400">${duLuan}</div><div class="text-xs text-slate-400">Trang dư luận</div></div>
      <div><div class="text-2xl font-bold ${filled===pages.length?'text-emerald-400':'text-amber-400'}">${filled}/${pages.length}</div><div class="text-xs text-slate-400">Đã có số liệu</div></div>
    </div>`,"mb-4");
  const num = v => v==null?'<span class="text-slate-600">—</span>':fmtC(v);
  const rows = pages.map(p=>`<tr class="border-t border-slate-800">
    <td class="py-2 pr-3 font-medium"><a href="${p.url}" target="_blank" class="hover:text-cyan-400">${p.ten} ↗</a></td>
    <td class="py-2 pr-3">${chip(p.loai, p.loai==='Chính'?'bg-cyan-500/20 text-cyan-300':'bg-slate-600/30 text-slate-300')}</td>
    <td class="py-2 pr-3 text-right">${num(p.follower)}</td>
    <td class="py-2 pr-3 text-right">${num(p.reach)}</td>
    <td class="py-2 pr-3 text-right">${p.engagement==null?'<span class="text-slate-600">—</span>':p.engagement+'%'}</td>
    <td class="py-2 text-right">${num(p.post)}</td></tr>`).join("");
  const tbl = card(`<h3 class="font-semibold mb-3">6 trang Facebook đang chạy (5 dư luận + trang chính)</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 text-xs uppercase"><tr>
      <th class="text-left pb-2 pr-3">Trang</th><th class="text-left pb-2 pr-3">Loại</th><th class="text-right pb-2 pr-3">Follower</th><th class="text-right pb-2 pr-3">Reach (kỳ)</th><th class="text-right pb-2 pr-3">Engagement</th><th class="text-right pb-2">Post</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="mt-3 text-[11px] text-slate-400">Số liệu follower/reach/engagement: điền tay qua <b>INPUT_HANGNGAY.md → mục 7</b> mỗi sáng (FB ẩn số sau login), hoặc nối facebook_organic để pull tự động.</div>`);

  const ph = D.pageHistory;
  const hasHist = ph && ph.dates && ph.dates.length;
  const chartCard = card(`<div class="flex items-center justify-between mb-3"><h3 class="font-semibold">Tăng trưởng theo ngày — ${ph?ph.metric:''}</h3></div>`
    + (hasHist
        ? `<div class="relative h-72"><canvas id="trangChart"></canvas></div>`
        : `<div class="h-32 grid place-items-center text-center text-sm text-slate-500">Chưa có dữ liệu lịch sử.<br>Nối <b class="text-slate-300">facebook_organic</b> (hoặc điền nhiều ngày qua INPUT) → biểu đồ tăng trưởng hiện ở đây.</div>`),"mt-4");
  return head + tbl + chartCard;
}

const RENDER = {tongquan:rTongQuan, trang:rTrang, content:rContent, seo:rSeo, chiso:rChiSo, danhgia:rDanhGia};
const DRAW = {tongquan:drawTongQuan, trang:drawTrangChart, content:drawContent, seo:drawSeoChart, chiso:drawChiSo};
function show(id){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  const tab = TABS.find(t=>t.id===id);
  document.getElementById("pageTitle").textContent = tab.ten.replace(/^\d+ · /,"");
  document.getElementById("pageDesc").textContent = tab.mota || "";
  const c = document.getElementById("content");
  c.className="p-6 fade"; c.innerHTML = RENDER[id]();
  if(DRAW[id]) DRAW[id]();
  if(window.innerWidth<768) document.getElementById("sidebar").classList.add("hidden");
  location.hash = id;
}
function drawTongQuan(){
  const items=D.tongQuan.map(m=>{ let p=pct(m.actual,m.target); if(m.thapTotHon&&m.actual!=null&&m.target)p=m.actual<=m.target?100:Math.round(m.target/m.actual*100); return {ten:m.ten,p}; });
  mkChart("tqChart",{type:"bar",data:{labels:items.map(i=>i.ten),
    datasets:[{data:items.map(i=>i.p==null?0:Math.min(i.p,100)),backgroundColor:items.map(i=>i.p==null?"#475569":i.p>=90?"#10b981":i.p>=50?"#f59e0b":"#f43f5e"),borderRadius:4}]},
    options:{...axisOpts,indexAxis:"y",scales:{x:{max:100,ticks:{callback:v=>v+"%"},grid:{color:"#1e293b"}},y:{ticks:{color:"#cbd5e1"},grid:{display:false}}}}});
}
function drawContent(){
  const ts=D.tuyenSanXuat||[];
  mkChart("reachChart",{type:"bar",data:{labels:ts.map(t=>t.tuyen),datasets:[{data:ts.map(t=>t.reach),backgroundColor:"#06b6d4",borderRadius:4}]},
    options:{...axisOpts,scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>v>=1e6?(v/1e6)+"M":(v/1e3)+"K"},grid:{color:"#1e293b"}}}}});
  const cnt={}; (D.duLuan||[]).forEach(p=>cnt[p.demand]=(cnt[p.demand]||0)+1);
  const labels=Object.keys(cnt);
  mkChart("dlChart",{type:"bar",data:{labels,datasets:[{data:labels.map(l=>cnt[l]),backgroundColor:labels.map(demandColor),borderRadius:4}]},
    options:{...axisOpts,scales:{x:{grid:{display:false}},y:{ticks:{stepSize:1},grid:{color:"#1e293b"}}}}});
}
function drawChiSo(){
  const c=(D.liveAds&&D.liveAds.campaigns)||[];
  mkChart("cpmChart",{type:"bar",data:{labels:c.map(x=>x.ten.length>24?x.ten.slice(0,24)+"…":x.ten),
    datasets:[{data:c.map(x=>x.cpm),backgroundColor:c.map(x=>x.cpm<=9000?"#10b981":x.cpm<=15000?"#14b8a6":x.cpm<=18000?"#f59e0b":"#f43f5e"),borderRadius:4}]},
    options:{...axisOpts,indexAxis:"y",scales:{x:{ticks:{callback:v=>(v/1000)+"K"},grid:{color:"#1e293b"}},y:{ticks:{color:"#cbd5e1"},grid:{display:false}}}}});
}
function drawTrangChart(){
  const ph=D.pageHistory; if(!ph||!ph.dates||!ph.dates.length)return;
  const colors=["#06b6d4","#f43f5e","#14b8a6","#f59e0b","#a855f7","#64748b"];
  mkChart("trangChart",{type:"line",data:{labels:ph.dates,
    datasets:ph.series.map((s,i)=>({label:s.ten,data:s.data,borderColor:colors[i%colors.length],backgroundColor:"transparent",borderWidth:2,tension:.3,pointRadius:2}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
    plugins:{legend:{position:"bottom",labels:{color:"#cbd5e1",boxWidth:12}}},
    scales:{x:{grid:{color:"#1e293b"}},y:{grid:{color:"#1e293b"}}}}});
}
function drawSeoChart(){
  const w=D.seoWeekly||[];
  mkChart("seoChart",{type:"bar",data:{labels:w.map(x=>x.tuan),
    datasets:[{label:"Target",data:w.map(x=>x.target),backgroundColor:"#0e7490",borderRadius:4},
              {label:"Actual",data:w.map(x=>x.actual),backgroundColor:"#06b6d4",borderRadius:4}]},
    options:{...axisOpts,plugins:{legend:{display:true,labels:{color:"#cbd5e1",boxWidth:12}}},scales:{x:{grid:{display:false}},y:{grid:{color:"#1e293b"}}}}});
}

/* ---------- INIT ---------- */
function init(){
  if(!D){document.getElementById("content").innerHTML='<div class="text-rose-400">Lỗi: không tải được data.js</div>';return;}
  document.getElementById("metaKy").textContent = D.meta.ky;
  document.getElementById("metaCapNhat").textContent = "Cập nhật: "+D.meta.capNhat;
  document.getElementById("metaNote").textContent = D.meta.ghiChu;
  const nav=document.getElementById("nav");
  nav.innerHTML = TABS.map(t=>`<button data-id="${t.id}" class="nav-btn text-left px-3 py-2 rounded-lg hover:bg-slate-800 transition flex items-center gap-2"><span>${t.icon}</span><span>${t.ten}</span></button>`).join("");
  nav.querySelectorAll(".nav-btn").forEach(b=>b.onclick=()=>show(b.dataset.id));
  const start = (location.hash||"#tongquan").slice(1);
  show(TABS.find(t=>t.id===start)?start:"tongquan");
}
init();
</script>
</body>
</html>
